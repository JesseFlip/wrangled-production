name: Build & Push Docker Images

on:
  push:
    branches: ['master']
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      wrangler: ${{ steps.filter.outputs.wrangler }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changed paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'apps/api/**'
              - 'apps/dashboard/**'
              - 'packages/contracts/**'
              - 'apps/api/Dockerfile'
            wrangler:
              - 'apps/wrangler/**'
              - 'apps/wrangler-ui/**'
              - 'packages/contracts/**'
              - 'apps/wrangler/Dockerfile'

  build-api:
    needs: changes
    if: needs.changes.outputs.api == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lowercase owner for Docker tags
        run: echo "OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push api image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/wrangled-api:latest
            ${{ env.REGISTRY }}/${{ env.OWNER }}/wrangled-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-wrangler:
    needs: changes
    if: needs.changes.outputs.wrangler == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lowercase owner for Docker tags
        run: echo "OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Set up QEMU (for arm64 cross-build)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push wrangler image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/wrangler/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/wrangled-wrangler:latest
            ${{ env.REGISTRY }}/${{ env.OWNER }}/wrangled-wrangler:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
