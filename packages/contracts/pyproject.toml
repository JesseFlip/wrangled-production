[project]
name = "wrangled-contracts"
version = "0.1.0"
description = "Shared pydantic models for the WrangLED monorepo"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.6",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/wrangled_contracts"]

[tool.ruff]
extend = "../../ruff.toml"

[dependency-groups]
dev = [
    "pytest>=8.0",
    "ruff>=0.5",
]
